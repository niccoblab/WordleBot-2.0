<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>

	  input, button {
	    width: 100%;
	    box-sizing: border-box;
	  }


      body {
        font-family: "Segoe UI", Arial, sans-serif;
        padding: 16px;
        width: 280px;
        background: #f4f4f4;
      }

      .card {
        background: white;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      }

      h3 {
        margin-top: 0;
        text-align: center;
        color: #2d2d2d;
        letter-spacing: 0.5px;
      }

      label {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
        display: block;
      }

      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      button:hover {
        background: #43a047;
      }

      pre {
        white-space: pre-wrap;
        margin-top: 14px;
        padding: 10px;
        background: #fafafa;
        border-radius: 6px;
        border: 1px solid #ddd;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h3>WordleBot</h3>

      <label for="guess">Guess</label>
      <input id="guess" placeholder="crane">

      <label for="colors">Color code (g/y/b)</label>
      <input id="colors" placeholder="gybgb">

      <button id="submit">Submit</button>

      <pre id="output">Loading WordleBot…</pre>
    </div>

    <script src="wordlebot.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
